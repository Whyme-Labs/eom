<!doctype html>
<html lang="en" data-resolution="landscape">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>EOM — two-way wire format</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: #FAFAF7; }
      /* Each beat fills the full 1920x1080 canvas. The captions track sits
         on top via z-index. */
      #root [data-composition-id] { position: absolute; inset: 0; }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="180"
      data-width="1920"
      data-height="1080"
    >
      <!-- 180-second master composition.
           Track 0: narration audio (silent rail; captions video has no voice).
           Tracks 1: six sequential beat sub-compositions.
           Track 2: captions overlay running for the full duration. -->

      <audio
        id="narration"
        src="narration.wav"
        data-start="0"
        data-duration="180"
        data-track-index="0"
        data-volume="0"
      ></audio>

      <!-- Beats — sequential on track 1, each occupies its full beat window. -->
      <div
        id="b1"
        data-composition-id="beat-1-hook"
        data-composition-src="compositions/beat-1-hook.html"
        data-start="0"
        data-duration="15"
        data-track-index="1"
      ></div>

      <div
        id="b2"
        data-composition-id="beat-2-outbound"
        data-composition-src="compositions/beat-2-outbound.html"
        data-start="15"
        data-duration="35"
        data-track-index="1"
      ></div>

      <div
        id="b3"
        data-composition-id="beat-3-inbound"
        data-composition-src="compositions/beat-3-inbound.html"
        data-start="50"
        data-duration="65"
        data-track-index="1"
      ></div>

      <div
        id="b4"
        data-composition-id="beat-4-architecture"
        data-composition-src="compositions/beat-4-architecture.html"
        data-start="115"
        data-duration="35"
        data-track-index="1"
      ></div>

      <div
        id="b5"
        data-composition-id="beat-5-finetune"
        data-composition-src="compositions/beat-5-finetune.html"
        data-start="150"
        data-duration="20"
        data-track-index="1"
      ></div>

      <div
        id="b6"
        data-composition-id="beat-6-close"
        data-composition-src="compositions/beat-6-close.html"
        data-start="170"
        data-duration="10"
        data-track-index="1"
      ></div>

      <!-- Captions overlay — sits above the beats for the full 180s. -->
      <div
        id="captions"
        data-composition-id="captions"
        data-composition-src="compositions/captions.html"
        data-start="0"
        data-duration="180"
        data-track-index="2"
        style="z-index: 50"
      ></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      // The master timeline holds nothing — sub-composition timelines are
      // auto-nested by the runtime. Register an empty paused timeline to
      // satisfy the contract.
      const tl = gsap.timeline({ paused: true });
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
